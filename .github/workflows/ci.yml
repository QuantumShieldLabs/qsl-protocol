name: qshield-ci
permissions:
  contents: read

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  classify:
    name: classify-qshield-ci-scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      workflow_security: ${{ steps.classify.outputs.workflow_security }}
      runtime_critical: ${{ steps.classify.outputs.runtime_critical }}
      scope_class: ${{ steps.classify.outputs.scope_class }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: classify
        name: Classify pull request scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/ci/classify_ci_scope.sh >> "$GITHUB_OUTPUT"

  ci_4a_evidence:
    name: ci-4a-evidence
    needs: classify
    if: github.event_name != 'pull_request' || needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run 4A gates
        run: |
          chmod +x scripts/ci/run_4a.sh
          scripts/ci/run_4a.sh

      - name: Retain 4A evidence snapshot from artifacts (always)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/4A_runs

          RID="$(find artifacts -maxdepth 3 -type f -name A1_bundle_integrity.json -path '*/4A/*' 2>/dev/null \
              | sed -n 's#^artifacts/\([^/]*\)/.*#\1#p' | sort | tail -n 1 || true)"

          if [ -z "$RID" ]; then
            echo "ERROR: no 4A run found under artifacts/ (missing artifacts/*/4A/A1_bundle_integrity.json)" >&2
            exit 1
          fi

          mkdir -p "evidence/4A_runs/$RID/4A"
          cp -a "artifacts/$RID/4A/." "evidence/4A_runs/$RID/4A/"
          test -s "evidence/4A_runs/$RID/4A/A1_bundle_integrity.json"

      - name: Upload 4A evidence (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-4A
          path: |
            evidence/4A_runs/**

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: qshield-artifacts
          path: artifacts/

  ci_4b_evidence:
    name: ci-4b-evidence
    needs: classify
    if: github.event_name != 'pull_request' || needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run 4B gates (capture exit code)
        id: run4b
        shell: bash
        run: |
          chmod +x scripts/ci/run_4b.sh
          set +e
          scripts/ci/run_4b.sh
          code="$?"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Phase 4B exit code: $code"
          exit 0

      - name: Upload 4B evidence (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-4B
          path: |
            evidence/4B_runs/**

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-4B
          path: artifacts/

      - name: Enforce fail-closed for 4B
        shell: bash
        run: |
          code="${{ steps.run4b.outputs.exit_code }}"
          echo "Phase 4B exit code (enforced): $code"
          test "$code" -eq 0
          python3 scripts/ci/assert_4b_ok.py

  ci_4c_evidence:
    name: ci-4c-evidence
    needs: classify
    if: github.event_name != 'pull_request' || needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run 4C gates (capture exit code)
        id: run4c
        shell: bash
        run: |
          chmod +x scripts/ci/run_4c.sh
          set +e
          scripts/ci/run_4c.sh
          code="$?"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Phase 4C exit code: $code"
          exit 0

      - name: Upload 4C evidence (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-4C
          path: |
            evidence/4C_runs/**

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-4C
          path: artifacts/

      - name: Enforce fail-closed for 4C
        shell: bash
        run: |
          code="${{ steps.run4c.outputs.exit_code }}"
          echo "Phase 4C exit code (enforced): $code"
          test "$code" -eq 0
          python3 scripts/ci/assert_4c_ok.py

  ci_4d_evidence:
    name: ci-4d-evidence
    needs: classify
    if: github.event_name != 'pull_request' || needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run 4D gates (capture exit code)
        id: run4d
        shell: bash
        run: |
          chmod +x scripts/ci/run_4d.sh
          set +e
          scripts/ci/run_4d.sh
          code="$?"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Phase 4D exit code: $code"
          exit 0

      - name: Upload 4D evidence (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-4D
          path: |
            evidence/4D_runs/**

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-4D
          path: artifacts/

      - name: Enforce fail-closed for 4D
        shell: bash
        run: |
          code="${{ steps.run4d.outputs.exit_code }}"
          echo "Phase 4D exit code (enforced): $code"
          test "$code" -eq 0
          python3 scripts/ci/assert_4d_ok.py

  ci_4d_dur_evidence:
    name: ci-4d-dur-evidence
    needs: classify
    if: github.event_name != 'pull_request' || needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run 4D durability gate (capture exit code)
        id: run4ddur
        shell: bash
        env:
          QSL_TEST_HOOKS: "1"
        run: |
          chmod +x scripts/ci/run_4d_dur.sh
          set +e
          scripts/ci/run_4d_dur.sh
          code="$?"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Phase 4D-DUR exit code: $code"
          exit 0

      - name: Upload 4D-DUR evidence (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-4D-DUR
          path: |
            evidence/4D_runs/**

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-4D-DUR
          path: artifacts/

      - name: Enforce fail-closed for 4D-DUR
        shell: bash
        run: |
          code="${{ steps.run4ddur.outputs.exit_code }}"
          echo "Phase 4D-DUR exit code (enforced): $code"
          test "$code" -eq 0
          python3 scripts/ci/assert_4d_dur_ok.py

  advisories:
    name: advisories
    needs: classify
    if: github.event_name != 'pull_request' || needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.0

      - name: Install cargo-binstall (compile, pinned)
        shell: bash
        run: |
          set -euo pipefail
          rustc --version
          cargo --version
          cargo install cargo-binstall --locked --version 1.10.0

      - name: Install cargo-audit (via binstall)
        shell: bash
        run: |
          set -euo pipefail
          cargo binstall cargo-audit --version 0.22.0 --no-confirm
          cargo audit --version || true

      - name: Cargo audit (fail-closed)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p advisories
          set +e
          cargo audit --deny warnings 2>&1 | tee advisories/audit_output.txt
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "== audit_output.txt (first 200 lines) =="
            sed -n '1,200p' advisories/audit_output.txt || true
            exit "$rc"
          fi

      - name: Upload advisories audit output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: advisories-audit-output
          path: advisories/audit_output.txt

  # Stable required branch-protection contexts.
  ci_4a:
    name: ci-4a
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; ci-4a required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run ci-4a
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo +stable build -p qsc --release --locked
          cargo +stable test -p qsc --locked

  ci_4b:
    name: ci-4b
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; ci-4b required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run ci-4b
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/run_4b.sh

  ci_4c:
    name: ci-4c
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; ci-4c required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run ci-4c
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/run_4c.sh

  ci_4d:
    name: ci-4d
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; ci-4d required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run ci-4d
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/run_4d.sh

  ci_4d_dur:
    name: ci-4d-dur
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; ci-4d-dur required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run ci-4d-dur
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/run_4d_dur.sh

  demo_cli_build:
    name: demo-cli-build
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; demo-cli-build required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run demo-cli-build
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/demo_cli_smoke.sh

  demo_cli_smoke:
    name: demo-cli-smoke
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; demo-cli-smoke required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run demo-cli-smoke
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/demo_cli_smoke.sh

  metadata_conformance_smoke:
    name: metadata-conformance-smoke
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; metadata-conformance-smoke required context resolved without runtime lane"
      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Run metadata-conformance-smoke
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/metadata_conformance_smoke.sh

  public_safety:
    name: public-safety
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run public-safety
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/check_release_auth.sh
