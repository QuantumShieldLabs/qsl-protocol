name: demo-packaging
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  classify:
    name: classify-demo-packaging-scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      workflow_security: ${{ steps.classify.outputs.workflow_security }}
      runtime_critical: ${{ steps.classify.outputs.runtime_critical }}
      scope_class: ${{ steps.classify.outputs.scope_class }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: classify
        name: Classify pull request scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/ci/classify_ci_scope.sh >> "$GITHUB_OUTPUT"

  demo-packaging-smoke:
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; demo packaging smoke resolved without runtime lane"

      - uses: actions/checkout@v5
        if: needs.classify.outputs.docs_only != 'true'
      - name: Ensure script is executable
        if: needs.classify.outputs.docs_only != 'true'
        run: chmod +x scripts/demo/qsc_demo_local.sh
      - name: Shellcheck (syntax)
        if: needs.classify.outputs.docs_only != 'true'
        run: bash -n scripts/demo/qsc_demo_local.sh
      - name: Demo script help
        if: needs.classify.outputs.docs_only != 'true'
        run: ./scripts/demo/qsc_demo_local.sh --help
      - name: Demo script dry-run (offline)
        if: needs.classify.outputs.docs_only != 'true'
        run: ./scripts/demo/qsc_demo_local.sh --dry-run --scenario drop+reorder --seed 7
      - name: Demo script full-run smoke (bounded)
        if: needs.classify.outputs.docs_only != 'true'
        run: timeout 60s ./scripts/demo/qsc_demo_local.sh --scenario happy-path --seed 1 --out ./_demo_ci
