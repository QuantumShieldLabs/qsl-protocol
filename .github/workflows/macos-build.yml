name: macos-build

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  classify:
    name: classify-macos-scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      workflow_security: ${{ steps.classify.outputs.workflow_security }}
      runtime_critical: ${{ steps.classify.outputs.runtime_critical }}
      scope_class: ${{ steps.classify.outputs.scope_class }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: classify
        name: Classify pull request scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            paths=()
            case "${PUSH_BEFORE:-}" in
              ""|0000000000000000000000000000000000000000)
                echo "WARN: push before SHA missing; classifying fail-closed"
                ;;
              *)
                mapfile -t paths < <(git diff --name-only "$PUSH_BEFORE" "$GITHUB_SHA" | LC_ALL=C sort)
                ;;
            esac
            if [ "${#paths[@]}" -eq 0 ]; then
              scripts/ci/classify_ci_scope.sh >> "$GITHUB_OUTPUT"
            else
              printf 'Changed files for push %s..%s:\n' "$PUSH_BEFORE" "$GITHUB_SHA"
              printf '%s\n' "${paths[@]}"
              scripts/ci/classify_ci_scope.sh "${paths[@]}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          scripts/ci/classify_ci_scope.sh >> "$GITHUB_OUTPUT"

  macos_qsc_qshield_build:
    name: macos-qsc-qshield-build
    needs: classify
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Resolve docs/governance-only PRs cheaply
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "docs/governance-only change; macOS build lane resolved without build/test workload"

      - name: Checkout
        if: needs.classify.outputs.docs_only != 'true'
        uses: actions/checkout@v5

      - name: Set up Rust
        if: needs.classify.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build qsc (release, locked)
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p qsc --release --locked

      - name: Run qsc smoke subset (locked)
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.tmp"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          cargo test -p qsc --locked --test vault -- --test-threads=1
          cargo test -p qsc --locked --test handshake_contract_na0217i -- --test-threads=1
          cargo test -p qsc --locked --test qsp_protocol_gate -- --test-threads=1

      - name: Build qshield-cli (release, locked)
        if: needs.classify.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p qshield-cli --release --locked

  macos_qsc_full_serial:
    name: macos-qsc-full-serial
    needs: classify
    if: github.event_name != 'pull_request' && needs.classify.outputs.docs_only != 'true'
    runs-on: macos-latest
    # ENG-0052 capacity correction (NA-0664, D-1288): raised 120 -> 180.
    # The pre-lane suite measured 105m52s (workflow_dispatch on e5313fa3,
    # 2026-07-21) = 88% of the old 120-minute budget. 180 is 1.70x that
    # measured runtime. This fits the ceiling to measured reality; it does
    # NOT absorb the NA-0663 regression, which remains open as ENG-0053.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build qsc (release, locked)
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p qsc --release --locked

      - name: Test qsc full serial suite (locked)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.tmp"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          cargo test -p qsc --locked --jobs 1 -- --test-threads=1

      - name: Build qshield-cli (release, locked)
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p qshield-cli --release --locked
