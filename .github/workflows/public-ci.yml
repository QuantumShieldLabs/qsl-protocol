name: public-ci

# 2026-07-14 self-repair bootstrap (operator-authorized): the push run for main merge
# 9018ae4f was never emitted by GitHub, leaving main without a public-safety check-run.
# This comment satisfies the bootstrap validator's required-paths rule; the incident
# record lives in docs/ops/ROLLING_OPERATIONS_JOURNAL.md (2026-07-14) and in
# scripts/ci/public_safety_gate.py above SELF_REPAIR_BOOTSTRAP_ROOT_PATHS.

on:
  push:
    branches: [ "main" ]
  pull_request_target:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Open PR number for the sanctioned public-safety bootstrap"
        required: true
        type: string

permissions:
  actions: read
  contents: read
  checks: read
  pull-requests: read

jobs:
  classify:
    name: classify-public-ci-scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      workflow_security: ${{ steps.classify.outputs.workflow_security }}
      runtime_critical: ${{ steps.classify.outputs.runtime_critical }}
      scope_class: ${{ steps.classify.outputs.scope_class }}
    steps:
      - name: Checkout workflow definition ref
        if: github.event_name != 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout push ref
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: classify
        name: Classify scope
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            paths=()
            case "${PUSH_BEFORE:-}" in
              ""|0000000000000000000000000000000000000000)
                echo "WARN: push before SHA missing; classifying fail-closed"
                ;;
              *)
                mapfile -t paths < <(git diff --name-only "$PUSH_BEFORE" "$GITHUB_SHA" | LC_ALL=C sort)
                ;;
            esac
            if [ "${#paths[@]}" -eq 0 ]; then
              scripts/ci/classify_ci_scope.sh >> "$GITHUB_OUTPUT"
            else
              printf 'Changed files for push %s..%s:\n' "$PUSH_BEFORE" "$GITHUB_SHA"
              printf '%s\n' "${paths[@]}"
              scripts/ci/classify_ci_scope.sh "${paths[@]}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "$GITHUB_EVENT_NAME" = "pull_request_target" ]; then
            pr_number="$PR_NUMBER"
          else
            pr_number="$DISPATCH_PR_NUMBER"
          fi

          mapfile -t paths < <(
            python3 scripts/ci/public_safety_gate.py \
              list-pr-files \
              --repo "$GITHUB_REPOSITORY" \
              --pr "$pr_number"
          )

          if [ "${#paths[@]}" -eq 0 ]; then
            echo "ERROR: no changed paths returned for PR $pr_number"
            exit 1
          fi

          printf 'Changed files for PR %s:\n' "$pr_number"
          printf '%s\n' "${paths[@]}"
          scripts/ci/classify_ci_scope.sh "${paths[@]}" >> "$GITHUB_OUTPUT"

  advisories:
    name: advisories
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow definition ref
        if: github.event_name != 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout push ref
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: pr_context
        name: Resolve PR context
        if: github.event_name != 'push'
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request_target" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$DISPATCH_PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - id: self_repair_bootstrap
        name: Detect sanctioned self-repair bootstrap PR
        if: github.event_name != 'push' && needs.classify.outputs.workflow_security == 'true' && needs.classify.outputs.runtime_critical != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/public_safety_gate.py \
            validate-self-repair-bootstrap-pr \
            --repo "$GITHUB_REPOSITORY" \
            --pr "${{ steps.pr_context.outputs.pr_number }}" \
            --sha "${{ steps.pr_context.outputs.head_sha }}" \
            --allow-missing-main-public-safety
          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Docs-only PR audit noop
        if: github.event_name != 'push' && needs.classify.outputs.runtime_critical != 'true' && needs.classify.outputs.workflow_security != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Docs-only PR: cargo audit is not required."

      - name: Sanctioned self-repair bootstrap advisories noop
        if: steps.self_repair_bootstrap.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Sanctioned workflow-only public-safety self-repair PR: cargo audit is intentionally skipped on unchanged vulnerable Cargo state."

      - name: Verify PR head for relevant PR/workflow lanes
        if: github.event_name != 'push' && (needs.classify.outputs.runtime_critical == 'true' || needs.classify.outputs.workflow_security == 'true')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/public_safety_gate.py \
            verify-pr-head \
            --repo "$GITHUB_REPOSITORY" \
            --pr "${{ steps.pr_context.outputs.pr_number }}" \
            --sha "${{ steps.pr_context.outputs.head_sha }}"

      - name: Set Rust toolchain (pinned)
        if: github.event_name == 'push' || ((needs.classify.outputs.runtime_critical == 'true' || needs.classify.outputs.workflow_security == 'true') && steps.self_repair_bootstrap.outputs.eligible != 'true')
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Install cargo-audit (locked, pinned)
        if: github.event_name == 'push' || ((needs.classify.outputs.runtime_critical == 'true' || needs.classify.outputs.workflow_security == 'true') && steps.self_repair_bootstrap.outputs.eligible != 'true')
        shell: bash
        run: |
          set -euo pipefail
          rustc --version
          cargo --version
          cargo install --locked cargo-audit --version 0.22.0
          cargo audit --version || true

      - name: Materialize PR Cargo.lock
        if: github.event_name != 'push' && (needs.classify.outputs.runtime_critical == 'true' || needs.classify.outputs.workflow_security == 'true') && steps.self_repair_bootstrap.outputs.eligible != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/public_safety_gate.py \
            write-repo-file \
            --repo "$GITHUB_REPOSITORY" \
            --ref "${{ steps.pr_context.outputs.head_sha }}" \
            --path Cargo.lock \
            --output /tmp/pr-Cargo.lock

      - name: Cargo audit (fail-closed) on push
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p advisories
          python3 scripts/ci/public_safety_gate.py \
            run-cargo-audit-with-resilience \
            --output advisories/audit_output.txt \
            --max-retries 2 \
            --retry-delay-seconds 20 \
            -- cargo audit --deny warnings

      - name: Cargo audit (fail-closed) on relevant PR/workflow lanes
        if: github.event_name != 'push' && (needs.classify.outputs.runtime_critical == 'true' || needs.classify.outputs.workflow_security == 'true') && steps.self_repair_bootstrap.outputs.eligible != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p advisories
          python3 scripts/ci/public_safety_gate.py \
            run-cargo-audit-with-resilience \
            --output advisories/audit_output.txt \
            --max-retries 2 \
            --retry-delay-seconds 20 \
            -- cargo audit --deny warnings --file /tmp/pr-Cargo.lock

      - name: Upload advisories audit output
        if: always() && (github.event_name == 'push' || ((needs.classify.outputs.runtime_critical == 'true' || needs.classify.outputs.workflow_security == 'true') && steps.self_repair_bootstrap.outputs.eligible != 'true'))
        uses: actions/upload-artifact@v6
        with:
          name: advisories-audit-output
          path: advisories/audit_output.txt

  public-safety:
    needs: [classify, advisories]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow definition ref
        if: github.event_name != 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout push ref
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: pr_context
        name: Resolve PR context
        if: github.event_name != 'push'
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request_target" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$DISPATCH_PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - id: self_repair_bootstrap
        name: Detect sanctioned self-repair bootstrap PR
        if: github.event_name != 'push' && needs.classify.outputs.workflow_security == 'true' && needs.classify.outputs.runtime_critical != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/public_safety_gate.py \
            validate-self-repair-bootstrap-pr \
            --repo "$GITHUB_REPOSITORY" \
            --pr "${{ steps.pr_context.outputs.pr_number }}" \
            --sha "${{ steps.pr_context.outputs.head_sha }}"
          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Require classify success
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.classify.result }}" != "success" ]; then
            echo "ERROR: classify result=${{ needs.classify.result }}"
            exit 1
          fi

      - name: Require advisories success
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.advisories.result }}" != "success" ]; then
            echo "ERROR: advisories result=${{ needs.advisories.result }}"
            exit 1
          fi

      - name: PR changed files (audit)
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/public_safety_gate.py \
            list-pr-files \
            --repo "$GITHUB_REPOSITORY" \
            --pr "${{ steps.pr_context.outputs.pr_number }}"

      - name: Pull request changed-content safety scan
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/public_safety_gate.py \
            scan-pr-changes \
            --repo "$GITHUB_REPOSITORY" \
            --pr "${{ steps.pr_context.outputs.pr_number }}" \
            --verify-sha "${{ steps.pr_context.outputs.head_sha }}"

      - name: Denylist filename scan
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          HITS="$(find . -type f \( -name '.env' -o -name '*.pem' -o -name '*.key' -o -name '*.p12' \) -print | wc -l | tr -d ' ')"
          echo "DENY_HITS_FILES=$HITS"
          if [ "$HITS" != "0" ]; then
            echo "ERROR: denylist filenames detected:"
            find . -type f \( -name '.env' -o -name '*.pem' -o -name '*.key' -o -name '*.p12' \) -print
            exit 2
          fi

      - name: High-confidence credential content scan
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          grep -R -n -E \
            "(-----BEGIN (OPENSSH |RSA |EC |DSA )?PRIVATE KEY-----|-----BEGIN PRIVATE KEY-----|BEGIN OPENSSH PRIVATE KEY|AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{20,}|glpat-[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|AIza[0-9A-Za-z_-]{35}|ya29\.[0-9A-Za-z_-]+|Authorization:[[:space:]]*Bearer[[:space:]]+[A-Za-z0-9_.=\-]{10,}|x-api-key[[:space:]]*[:=][[:space:]]*[A-Za-z0-9_-]{10,})" \
            docs inputs README.md LICENSE SECURITY.md CONTRIBUTING.md THIRD_PARTY_NOTICES.md CODE_OF_CONDUCT.md SUPPORT.md DECISIONS.md TRACEABILITY.md NEXT_ACTIONS.md \
            > /tmp/highconf_hits.txt || true

          CNT="$(wc -l < /tmp/highconf_hits.txt | tr -d ' ')"
          echo "HC_COUNT=$CNT"
          if [ "$CNT" != "0" ]; then
            echo "ERROR: high-confidence credential hits detected (showing first 200 lines):"
            sed -n '1,200p' /tmp/highconf_hits.txt
            exit 2
          fi

      - name: Vector JSON parse sanity
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import json
          import sys

          files = sorted(glob.glob('inputs/suite2/vectors/*.json'))
          if not files:
              print('ERROR: no vector JSON files found under inputs/suite2/vectors')
              sys.exit(2)

          for path in files:
              with open(path, 'r', encoding='utf-8') as handle:
                  json.load(handle)
          print(f'Parsed {len(files)} vector JSON files successfully.')
          PY

      - name: Markdown link check (relative links)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re

          repo = pathlib.Path('.').resolve()
          md_files = []
          for pattern in ('README.md', 'docs/**/*.md'):
              for path in repo.glob(pattern):
                  if path.is_file():
                      md_files.append(path)
          md_files = sorted(set(md_files))
          missing = []
          link_re = re.compile(r'\[[^\]]+\]\(([^)#]+)(?:#[^)]+)?\)')

          def strip_code_blocks(text: str) -> str:
              return re.sub(r'```.*?```', '', text, flags=re.S)

          for md in md_files:
              text = strip_code_blocks(md.read_text(encoding='utf-8', errors='replace'))
              for raw in link_re.findall(text):
                  target = raw.strip()
                  if not target or '://' in target or target.startswith('mailto:'):
                      continue
                  if target.startswith('<') and target.endswith('>'):
                      target = target[1:-1]
                  abs_target = (md.parent / target).resolve()
                  if not abs_target.exists():
                      missing.append((md.relative_to(repo).as_posix(), target))

          for src, target in missing:
              print(f'MISSING_LINK {src} -> {target}')
          print(f'TOTAL_MISSING {len(missing)}')
          if missing:
              raise SystemExit(2)
          PY

      - name: Vector JSON structure sanity
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import json
          import sys

          files = sorted(glob.glob('inputs/suite2/vectors/*.json'))
          if not files:
              print('ERROR: no vector JSON files found under inputs/suite2/vectors')
              sys.exit(2)

          obj_count = 0
          array_count = 0
          for path in files:
              with open(path, 'r', encoding='utf-8') as handle:
                  data = json.load(handle)
              if data is None:
                  print(f'ERROR: {path} is empty/null')
                  sys.exit(2)
              if isinstance(data, list):
                  if not data:
                      print(f'ERROR: {path} is an empty array')
                      sys.exit(2)
                  array_count += 1
                  continue
              if isinstance(data, dict):
                  obj_count += 1
                  if not any(key in data for key in ('cases', 'vectors', 'tests')):
                      print(f'ERROR: {path} missing top-level cases/vectors/tests')
                      sys.exit(2)
                  if all(not data.get(key) for key in ('cases', 'vectors', 'tests')):
                      print(f'ERROR: {path} has empty cases/vectors/tests')
                      sys.exit(2)
                  continue
              print(f'ERROR: {path} is not an object or array')
              sys.exit(2)

          print(f'Vector structure OK. objects={obj_count} arrays={array_count}')
          PY

      - name: Block relevant PRs when latest main public-safety is red unless the PR clears live advisories
        if: github.event_name != 'push' && (needs.classify.outputs.runtime_critical == 'true' || needs.classify.outputs.workflow_security == 'true')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [ "${{ steps.self_repair_bootstrap.outputs.eligible }}" = "true" ]; then
            args+=(
              --allow-self-repair-bootstrap-pr "${{ steps.pr_context.outputs.pr_number }}"
              --expected-pr-sha "${{ steps.pr_context.outputs.head_sha }}"
            )
          else
            args+=(
              --allow-advisory-remediation-pr "${{ steps.pr_context.outputs.pr_number }}"
              --allow-red-main-repair-pr "${{ steps.pr_context.outputs.pr_number }}"
              --expected-pr-sha "${{ steps.pr_context.outputs.head_sha }}"
              --expected-red-main-repair-sha "${{ steps.pr_context.outputs.head_sha }}"
              --red-main-repair-profile send_commit_vault_mock_provider_retired
              --expected-main-failure-marker send_commit
              --expected-main-failure-marker vault_mock_provider_retired
            )
          fi
          python3 scripts/ci/public_safety_gate.py \
            check-main-public-safety \
            --repo "$GITHUB_REPOSITORY" \
            "${args[@]}"

      - name: Fail main public-safety when push-only full suites are red
        if: github.event_name == 'push' && needs.classify.outputs.docs_only != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          # ENG-0052 (NA-0664, D-1289) — THE WATCHDOG BUDGET IS DERIVED, NOT HARDCODED.
          #
          # This step waits for two push-only full suites that live in OTHER workflow
          # files, so GitHub's `needs:` cannot express the dependency and the wait has
          # to be polled. A poll needs a budget, and that budget is logically DERIVED
          # from the ceilings of the suites it waits on: it must outlast the slowest
          # one, or it reports a false red while the suite is still running.
          #
          # It was previously the literal `--max-iterations 390` (~130m at 20s). When
          # NA-0664 raised the suite ceilings to 180m/240m, that literal was left
          # behind and became the binding constraint: on merge `ca6897fc` the watchdog
          # exhausted 390/390 iterations and failed while `qsc-linux-full-suite` was
          # still in_progress — which then PASSED, 20m52s later. Both suites were
          # green; main went red anyway.
          #
          # So the count is now COMPUTED from the ceilings at run time. Raising either
          # ceiling raises this automatically; removing one, or setting a ceiling this
          # job cannot cover, fails LOUDLY here instead of silently 130 minutes later.
          # Do not replace this with a literal.

          INTERVAL_SECONDS=20
          QUEUE_MARGIN_MINUTES=60
          JOB_TIMEOUT_MINUTES=360   # GitHub default; this job declares no timeout-minutes
          SAFETY_GAP_MINUTES=20

          ceiling_of() {
            local file="$1" job="$2" value
            value="$(awk -v job="  ${job}:" '
              $0 == job { injob = 1; next }
              injob && /^  [a-zA-Z_]+:[ \t]*$/ { exit }
              injob && $1 == "timeout-minutes:" { print $2; exit }
            ' "$file")"
            if [ -z "$value" ]; then
              echo "ERROR: no timeout-minutes found for job '${job}' in ${file}." >&2
              echo "       The public-safety watchdog budget is DERIVED from that ceiling." >&2
              echo "       If the ceiling was removed, this watchdog can no longer be sized." >&2
              exit 2
            fi
            printf '%s' "$value"
          }

          MACOS_CEILING="$(ceiling_of .github/workflows/macos-build.yml macos_qsc_full_serial)"
          LINUX_CEILING="$(ceiling_of .github/workflows/ci.yml qsc_linux_full_suite)"

          MAX_CEILING="$MACOS_CEILING"
          if [ "$LINUX_CEILING" -gt "$MAX_CEILING" ]; then
            MAX_CEILING="$LINUX_CEILING"
          fi

          COVERAGE_MINUTES=$(( MAX_CEILING + QUEUE_MARGIN_MINUTES ))
          MAX_ITERATIONS=$(( COVERAGE_MINUTES * 60 / INTERVAL_SECONDS ))
          SAFE_BOUND=$(( JOB_TIMEOUT_MINUTES - SAFETY_GAP_MINUTES ))

          if [ "$COVERAGE_MINUTES" -gt "$SAFE_BOUND" ]; then
            echo "ERROR: derived watchdog coverage ${COVERAGE_MINUTES}m exceeds the safe bound ${SAFE_BOUND}m." >&2
            echo "       This job inherits GitHub's ${JOB_TIMEOUT_MINUTES}-minute default; a longer poll" >&2
            echo "       would be killed mid-wait, reproducing the ENG-0052 failure it exists to prevent." >&2
            echo "       Raise this job's timeout-minutes deliberately, or lower a suite ceiling." >&2
            exit 2
          fi

          echo "public-safety watchdog budget — DERIVED from the suite ceilings:"
          echo "  macos-qsc-full-serial ceiling : ${MACOS_CEILING}m"
          echo "  qsc-linux-full-suite ceiling  : ${LINUX_CEILING}m"
          echo "  binding ceiling               : ${MAX_CEILING}m"
          echo "  + queue/jitter margin         : ${QUEUE_MARGIN_MINUTES}m"
          echo "  = coverage                    : ${COVERAGE_MINUTES}m  (safe bound ${SAFE_BOUND}m)"
          echo "  interval                      : ${INTERVAL_SECONDS}s"
          echo "  => --max-iterations           : ${MAX_ITERATIONS}"

          python3 scripts/ci/public_safety_gate.py \
            wait-commit-checks \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --required qsc-linux-full-suite \
            --required macos-qsc-full-serial \
            --interval-seconds "$INTERVAL_SECONDS" \
            --max-iterations "$MAX_ITERATIONS"

      - name: Skip full-suite wait for docs/governance-only main push
        if: github.event_name == 'push' && needs.classify.outputs.docs_only == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "docs/governance-only main push; public-safety fast checks passed and full-suite wait is skipped"
